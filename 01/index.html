<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار أساسيات TCP/IP التفاعلي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-out;
        }
        
        .header h1 {
            color: #00d4ff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        
        .header p {
            color: #a0aec0;
            font-size: 1.1em;
        }
        
        .quiz-container {
            background: rgba(20, 30, 60, 0.8);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            display: none;
        }
        
        .quiz-container.active {
            display: block;
            animation: slideIn 0.3s ease-out;
        }
        
        .question {
            margin-bottom: 25px;
        }
        
        .question-text {
            color: #00d4ff;
            font-size: 1.2em;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .option {
            background: rgba(30, 40, 70, 0.6);
            border: 2px solid #4a5f8f;
            border-radius: 8px;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #cbd5e0;
        }
        
        .option:hover {
            background: rgba(40, 50, 90, 0.8);
            border-color: #00d4ff;
        }
        
        .option.selected {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }
        
        .option.correct {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
            color: #00ff88;
        }
        
        .option.incorrect {
            background: rgba(255, 0, 0, 0.2);
            border-color: #ff0000;
            color: #ff6b6b;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            color: #0a0e27;
        }
        
        .btn-submit:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        .btn-next {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            border: 2px solid #00d4ff;
        }
        
        .btn-next:hover {
            background: rgba(0, 212, 255, 0.3);
        }
        
        .progress {
            background: rgba(30, 40, 70, 0.6);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .progress-text {
            color: #a0aec0;
        }
        
        .progress-bar {
            flex: 1;
            height: 8px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 4px;
            margin: 0 15px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            transition: width 0.3s ease;
        }
        
        .result {
            background: rgba(20, 30, 60, 0.8);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            display: none;
        }
        
        .result.active {
            display: block;
        }
        
        .result-score {
            font-size: 3em;
            color: #00ff88;
            margin: 20px 0;
            font-weight: bold;
        }
        
        .result-message {
            font-size: 1.3em;
            color: #cbd5e0;
            margin: 20px 0;
        }
        
        .btn-restart {
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            color: #0a0e27;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            font-weight: 600;
        }
        
        .btn-restart:hover {
            transform: scale(1.05);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 اختبار أساسيات TCP/IP</h1>
            <p>اختبر معلوماتك عن بروتوكولات الشبكة</p>
        </div>
        
        <div class="quiz-container active" id="quizContainer">
            <div class="progress">
                <span class="progress-text">السؤال <span id="currentQuestion">1</span> من <span id="totalQuestions">35</span></span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="question">
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
            </div>
            
            <div class="buttons">
                <button class="btn btn-submit" onclick="submitAnswer()">تأكيد الإجابة</button>
            </div>
        </div>
        
        <div class="result" id="resultContainer">
            <h2>انتهى الاختبار!</h2>
            <div class="result-score" id="scoreDisplay"></div>
            <div class="result-message" id="resultMessage"></div>
            <button class="btn-restart" onclick="restartQuiz()">إعادة الاختبار</button>
        </div>
    </div>
    
    <script>
        const questions = [
            {
                question: "ما هو الغرض الأساسي من نموذج TCP/IP؟",
                options: [
                    "توفير إطار عمل لتصميم الشبكات",
                    "تشفير البيانات",
                    "إدارة أجهزة الكمبيوتر",
                    "تصنيع الأجهزة"
                ],
                correct: 0,
                explanation: "نموذج TCP/IP يوفر إطار عمل شامل لتصميم وتطبيق الشبكات"
            },
            {
                question: "كم عدد الطبقات في نموذج TCP/IP؟",
                options: ["3", "4", "5", "7"],
                correct: 1,
                explanation: "نموذج TCP/IP يتكون من 4 طبقات: التطبيق، النقل، الإنترنت، والربط"
            },
            {
                question: "أي من البروتوكولات التالية يعمل على طبقة النقل؟",
                options: ["HTTP", "TCP", "IP", "DNS"],
                correct: 1,
                explanation: "TCP يعمل على طبقة النقل، بينما HTTP يعمل على طبقة التطبيق"
            },
            {
                question: "ما الفرق الرئيسي بين TCP و UDP؟",
                options: [
                    "TCP أسرع من UDP",
                    "TCP موثوق و UDP غير موثوق",
                    "UDP يستخدم فقط للبريد الإلكتروني",
                    "TCP لا يستخدم في الإنترنت"
                ],
                correct: 1,
                explanation: "TCP يوفر توصيل موثوق للبيانات بينما UDP يوفر توصيل سريع لكن غير موثوق"
            },
            {
                question: "صحيح أم خطأ: IP يعمل على طبقة التطبيق",
                options: ["صحيح", "خطأ"],
                correct: 1,
                explanation: "IP يعمل على طبقة الإنترنت وليس طبقة التطبيق"
            }
        ];
        
        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;
        let selectedOption = null;
        
        function loadQuestion() {
            const question = questions[currentQuestionIndex];
            document.getElementById('questionText').textContent = question.question;
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('totalQuestions').textContent = questions.length;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = option;
                div.onclick = () => selectOption(index);
                div.id = 'option-' + index;
                optionsContainer.appendChild(div);
            });
            
            const progressPercent = ((currentQuestionIndex + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progressPercent + '%';
            
            answered = false;
            selectedOption = null;
        }
        
        function selectOption(index) {
            if (answered) return;
            
            selectedOption = index;
            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.classList.remove('selected');
                if (i === index) opt.classList.add('selected');
            });
        }
        
        function submitAnswer() {
            if (selectedOption === null) {
                alert('الرجاء اختيار إجابة');
                return;
            }
            
            answered = true;
            const question = questions[currentQuestionIndex];
            const isCorrect = selectedOption === question.correct;
            
            if (isCorrect) {
                score++;
                document.getElementById('option-' + selectedOption).classList.add('correct');
            } else {
                document.getElementById('option-' + selectedOption).classList.add('incorrect');
                document.getElementById('option-' + question.correct).classList.add('correct');
            }
            
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < questions.length) {
                    loadQuestion();
                } else {
                    showResult();
                }
            }, 2000);
        }
        
        function showResult() {
            document.getElementById('quizContainer').classList.remove('active');
            document.getElementById('resultContainer').classList.add('active');
            
            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('scoreDisplay').textContent = score + ' / ' + questions.length;
            
            let message = '';
            if (percentage >= 80) {
                message = 'ممتاز! أنت متقن لأساسيات TCP/IP 🌟';
            } else if (percentage >= 60) {
                message = 'جيد! تحتاج لمراجعة بعض المواضيع 📚';
            } else {
                message = 'تحتاج لدراسة أكثر 💪';
            }
            
            document.getElementById('resultMessage').textContent = message + ' (' + percentage + '%)';
        }
        
        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            answered = false;
            selectedOption = null;
            
            document.getElementById('quizContainer').classList.add('active');
            document.getElementById('resultContainer').classList.remove('active');
            
            loadQuestion();
        }
        
        // Start quiz
        loadQuestion();
    </script>
</body>
</html>
